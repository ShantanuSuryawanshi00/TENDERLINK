{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TENDERLINK</title>
    <link rel="stylesheet" href="{% static 'css/style_v3.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="auth-page-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-fingerprint"></i>
                <h2>Welcome Back</h2>
                <p>Sign in to manage your tenders and bids</p>
            </div>

            <form class="auth-form" method="POST">
                {% csrf_token %}

                {% if messages %}
                {% for message in messages %}
                <div class="auth-alert"
                    style="background: #fee2e2; color: #991b1b; padding: 10px; margin-bottom: 15px; border-radius: 8px;">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="auth-input" placeholder="official@company.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" name="password" id="signin-password" class="auth-input"
                            placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" data-target="signin-password"
                            style="position: absolute; right: 15px; top: 15px; color: #94a3b8; cursor: pointer;"></i>
                    </div>
                </div>

                <div class="auth-options">
                    <label style="display: flex; align-items: center; gap: 8px; font-weight: 400; margin: 0;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="{% url 'register' %}">Register Now</a></p>
                <p style="margin-top: 10px;"><a href="{% url 'index' %}"
                        style="color: var(--medium-text); text-decoration: underline;">Back to Home</a></p>
            </div>
        </div>
    </div>
    <script src="{% static 'js/script_v3.js' %}"></script>
</body>

</html>
